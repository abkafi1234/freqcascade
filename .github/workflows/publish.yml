name: Publish to PyPI

# Trigger by publishing a GitHub Release (recommended: tag the release
# vX.Y.Z to match the version in pyproject.toml), or run manually via
# workflow_dispatch for a dry-run build without publishing.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Actually upload to PyPI (unchecked = build only, for a dry run)"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: pipx run twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || inputs.publish
    environment:
      name: pypi
      url: https://pypi.org/project/freqcascade/
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC) -- no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # pypa/gh-action-pypi-publish signs a Sigstore/PEP 740 attestation for
      # each file before uploading, so every publish depends on Sigstore's
      # public Rekor transparency-log service being reachable. That service
      # has known, transient connectivity blips (e.g. `ConnectionResetError`
      # from rekor.sigstore.dev) unrelated to this package or workflow --
      # retrying almost always just works. Retried up to 3x here instead of
      # requiring a manual re-run. Safe to retry freely: the attestation
      # step runs *before* the actual PyPI upload, so a failure here means
      # nothing was uploaded yet -- no partial-publish state to worry about.
      - name: Publish to PyPI (attempt 1)
        id: publish_1
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

      - name: Publish to PyPI (attempt 2, retry on transient Sigstore/Rekor failure)
        id: publish_2
        if: steps.publish_1.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

      - name: Publish to PyPI (attempt 3, final retry)
        if: steps.publish_1.outcome == 'failure' && steps.publish_2.outcome == 'failure'
        uses: pypa/gh-action-pypi-publish@release/v1
